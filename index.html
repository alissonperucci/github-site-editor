<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InstaNinja — Automação de Instagram #1 do Brasil</title>
    <meta name="description" content="Responda comentários, envie links e faça autoatendimento no Instagram automaticamente. +50 mil usuários ativos. API oficial da Meta. Teste grátis." />
    <meta name="author" content="InstaNinja" />
    <link rel="canonical" href="https://www.instaninja.com.br/" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://img.youtube.com" />
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://flagcdn.com" />
    <link rel="dns-prefetch" href="https://www.instaninja.com.br" />

    <!-- Font - swap for performance -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" /></noscript>

    <!-- Open Graph -->
    <meta property="og:title" content="InstaNinja — Automação de Instagram #1 do Brasil" />
    <meta property="og:description" content="Responda comentários, envie links e faça autoatendimento no Instagram automaticamente. +50 mil usuários ativos." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.instaninja.com.br/" />
    <meta property="og:image" content="https://www.instaninja.com.br/og-image.png" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="InstaNinja" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="InstaNinja — Automação de Instagram #1 do Brasil" />
    <meta name="twitter:description" content="Responda comentários, envie links e faça autoatendimento no Instagram automaticamente." />
    <meta name="twitter:image" content="https://www.instaninja.com.br/og-image.png" />

    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "InstaNinja",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Automação de Instagram: responda comentários e envie Direct automaticamente com API oficial da Meta.",
      "url": "https://www.instaninja.com.br",
      "offers": {
        "@type": "Offer",
        "price": "39.90",
        "priceCurrency": "BRL"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "50000"
      }
    }
    </script>

    <!-- Performance hints -->
    <style>
      /* Critical CSS - prevent FOUC */
      body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #F8F9FA; }
      #root { min-height: 100vh; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
